<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>日日養生村｜生活手冊</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="日日養生村住民生活百科與手冊">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* 針對長輩閱讀習慣優化 */
    :root {
      --theme-color: #2c7a7b; /* 養生村主題色：深綠色 */
    }
    .markdown-section {
      font-size: 1.2rem; /* 字體加大 */
      line-height: 1.8;  /* 行距加寬 */
      max-width: 800px;
    }
    .sidebar {
      font-size: 1.1rem;
    }
    /* 修正搜尋框手機端樣式 */
    .search input {
      font-size: 1rem !important;
    }
  </style>
</head>
<body>
  <div id="app">載入中，請稍候...</div>
  
  <script>
    window.$docsify = {
      name: '日日養生村｜生活百科',
      repo: '', // 如果有 GitHub 網址可以貼在這
      loadSidebar: true,    // 必開：載入側邊欄
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 2,       // 側邊欄顯示到第二層標題 (##)
      auto2top: true,       // 切換頁面後自動回到頂部
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜尋關鍵字（如：接駁）',
        noData: '找不到相關內容',
        depth: 6
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true
      }
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
